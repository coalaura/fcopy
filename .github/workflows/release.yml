name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  project_name: fcopy

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Test
      run: go test ./...

    - name: Vet
      run: go vet ./...

    - name: Integration test
      shell: bash
      run: |
        go build -o bin/fcopy .

        mkdir -p testdata/source/nested testdata/source/ignored
        printf 'root\n' > testdata/source/root.txt
        printf 'nested\n' > testdata/source/nested/file.txt
        printf 'excluded\n' > testdata/source/nested/file.tmp
        printf 'ignored\n' > testdata/source/ignored/file.txt
        ln -s ../root.txt testdata/source/nested/root-link

        mkdir -p testdata/expected
        cp -a testdata/source/. testdata/expected/
        rm -rf testdata/expected/ignored
        rm testdata/expected/nested/file.tmp

        ./bin/fcopy \
          --exclude '*.tmp' \
          --exclude 'ignored/**' \
          testdata/source testdata/destination

        diff -r testdata/expected testdata/destination
        test -L testdata/destination/nested/root-link
        test "$(readlink testdata/destination/nested/root-link)" = "../root.txt"
        test ! -e testdata/destination/nested/file.tmp
        test ! -e testdata/destination/ignored

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: false

    - name: Cache Go build and modules
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('**/go.sum', '**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.goos }}-${{ matrix.goarch }}-

    - name: Build
      shell: bash
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        mkdir -p bin
        EXT=""
        LDFLAGS=""

        if [[ "$GOOS" == "windows" ]]; then
          EXT=".exe"
        fi

        go build \
          -trimpath \
          -buildvcs=false \
          -ldflags "-s -w -X 'main.Version=${{ github.ref_name }}' $LDFLAGS" \
          -o "bin/${{ env.project_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" .

    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.project_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
        path: bin/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: ${{ env.project_name }}_*
        path: bin
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*
        name: "Release ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}